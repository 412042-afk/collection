<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>珍藏大師 - 古典卷宗庫</title>
  
  <!-- 引入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 引入 Google Fonts (Noto Serif TC) -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&display=swap" rel="stylesheet">
  
  <!-- 引入 Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    body {
      font-family: 'Noto Serif TC', serif;
    }
    /* 自訂卷軸樣式 */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #e8e3d5; }
    ::-webkit-scrollbar-thumb { background: #8f8373; border: 1px solid #332c23; }
    ::-webkit-scrollbar-thumb:hover { background: #332c23; }
  </style>
</head>
<body class="bg-[#f3f0e8] text-[#332c23] min-h-screen relative overflow-x-hidden selection:bg-[#332c23] selection:text-[#f3f0e8]">

  <!-- 復古紙張雜訊濾鏡 -->
  <svg class="fixed inset-0 w-full h-full pointer-events-none opacity-[0.04] z-50 mix-blend-multiply">
    <filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" stitchTiles="stitch"/></filter>
    <rect width="100%" height="100%" filter="url(#noise)"/>
  </svg>

  <!-- 背景花草裝飾 (右上) -->
  <svg class="fixed top-0 right-0 w-64 h-64 text-[#332c23] opacity-15 pointer-events-none transform rotate-90 z-0" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="0.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M0,100 Q40,60 100,0" stroke-dasharray="1 1" /><path d="M0,100 Q30,70 100,10" /><path d="M15,85 C5,70 20,55 35,65 C45,75 30,90 15,85 Z" /><path d="M15,85 Q25,75 35,65" stroke-width="0.2"/><path d="M22,78 L18,72 M28,72 L23,66 M32,68 L28,62" stroke-width="0.2"/><path d="M40,60 C30,45 45,30 60,40 C70,50 55,65 40,60 Z" /><path d="M40,60 Q50,50 60,40" stroke-width="0.2"/><path d="M47,53 L43,47 M53,47 L48,41 M57,43 L53,37" stroke-width="0.2"/><path d="M65,35 C55,20 70,5 85,15 C95,25 80,40 65,35 Z" /><path d="M65,35 Q75,25 85,15" stroke-width="0.2"/><path d="M25,75 Q40,95 55,85" /><circle cx="55" cy="85" r="1.5" /><circle cx="59" cy="82" r="1" /><path d="M50,50 Q65,70 80,60" /><circle cx="80" cy="60" r="1.5" /><circle cx="84" cy="57" r="0.8" />
  </svg>
  <!-- 背景花草裝飾 (左下) -->
  <svg class="fixed bottom-0 left-0 w-80 h-80 text-[#332c23] opacity-15 pointer-events-none transform -rotate-90 z-0" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="0.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M0,100 Q40,60 100,0" stroke-dasharray="1 1" /><path d="M0,100 Q30,70 100,10" /><path d="M15,85 C5,70 20,55 35,65 C45,75 30,90 15,85 Z" /><path d="M15,85 Q25,75 35,65" stroke-width="0.2"/><path d="M22,78 L18,72 M28,72 L23,66 M32,68 L28,62" stroke-width="0.2"/><path d="M40,60 C30,45 45,30 60,40 C70,50 55,65 40,60 Z" /><path d="M40,60 Q50,50 60,40" stroke-width="0.2"/><path d="M47,53 L43,47 M53,47 L48,41 M57,43 L53,37" stroke-width="0.2"/><path d="M65,35 C55,20 70,5 85,15 C95,25 80,40 65,35 Z" /><path d="M65,35 Q75,25 85,15" stroke-width="0.2"/><path d="M25,75 Q40,95 55,85" /><circle cx="55" cy="85" r="1.5" /><circle cx="59" cy="82" r="1" /><path d="M50,50 Q65,70 80,60" /><circle cx="80" cy="60" r="1.5" /><circle cx="84" cy="57" r="0.8" />
  </svg>

  <!-- 載入中畫面 -->
  <div id="loading-screen" class="fixed inset-0 bg-[#f3f0e8] z-[100] flex items-center justify-center">
    <i data-lucide="loader-2" class="animate-spin text-[#332c23] w-10 h-10 stroke-[1.5]"></i>
  </div>

  <!-- 登入畫面 -->
  <div id="login-screen" class="hidden fixed inset-0 flex items-center justify-center z-40 px-4">
    <div class="bg-[#e8e3d5] p-10 border-2 border-[#332c23] shadow-[10px_10px_0_#221d17] text-center relative z-10 max-w-sm w-full animate-[fadeIn_0.5s_ease-out]">
      <i data-lucide="box" class="mx-auto mb-6 text-[#332c23] w-14 h-14 stroke-1"></i>
      <h1 class="text-3xl font-bold tracking-widest mb-2">珍藏大師</h1>
      <p class="text-[#6b5a45] italic mb-10">Collection Manager</p>
      <button id="btn-login" class="w-full bg-[#332c23] text-[#f3f0e8] py-4 border-2 border-[#332c23] font-bold tracking-widest shadow-[4px_4px_0_#8f8373] hover:shadow-[2px_2px_0_#8f8373] hover:translate-y-0.5 transition-all flex items-center justify-center gap-3">
        以 Google 授權開啟卷宗庫
      </button>
    </div>
  </div>

  <!-- 主應用程式 -->
  <div id="main-app" class="hidden flex min-h-screen relative z-10">
    <!-- 側邊導航欄 -->
    <aside class="w-20 lg:w-64 border-r-2 border-[#332c23] bg-[#e8e3d5] flex flex-col p-5 sticky top-0 h-screen">
      <div class="flex items-center gap-3 px-2 mb-12">
        <div class="w-10 h-10 border-2 border-[#332c23] bg-[#f3f0e8] flex items-center justify-center text-[#332c23] shadow-[3px_3px_0_#332c23] shrink-0">
          <i data-lucide="box" class="w-5 h-5 stroke-[1.5]"></i>
        </div>
        <div class="flex flex-col lg:block hidden">
          <span class="font-bold text-xl tracking-widest leading-none">珍藏大師</span>
          <span class="text-[10px] italic text-[#6b5a45] mt-1">Collection Manager</span>
        </div>
      </div>

      <nav class="flex-1 space-y-3" id="nav-menu">
        <button data-tab="dashboard" class="nav-item active w-full flex items-center gap-3 px-4 py-3 border-2 border-transparent transition-all duration-200 bg-[#332c23] text-[#f3f0e8] border-[#332c23] shadow-[3px_3px_0_#8f8373]">
          <i data-lucide="layout-grid" class="w-5 h-5 stroke-[1.5]"></i>
          <span class="font-semibold tracking-wider text-sm lg:block hidden uppercase">控制面板</span>
        </button>
        <button data-tab="collections" class="nav-item w-full flex items-center gap-3 px-4 py-3 border-2 border-transparent transition-all duration-200 text-[#6b5a45] hover:border-[#332c23] hover:text-[#332c23] hover:shadow-[3px_3px_0_#b8b0a1]">
          <i data-lucide="package" class="w-5 h-5 stroke-[1.5]"></i>
          <span class="font-semibold tracking-wider text-sm lg:block hidden uppercase">全部藏品</span>
        </button>
      </nav>

      <div class="mt-auto space-y-4 border-t-2 border-dashed border-[#8f8373] pt-6">
        <button id="btn-logout" class="w-full flex items-center gap-3 px-4 py-3 border-2 border-transparent transition-all duration-200 text-[#6b5a45] hover:border-[#332c23] hover:text-[#332c23] hover:shadow-[3px_3px_0_#b8b0a1]">
          <i data-lucide="log-out" class="w-5 h-5 stroke-[1.5]"></i>
          <span class="font-semibold tracking-wider text-sm lg:block hidden uppercase">鎖上卷宗</span>
        </button>
      </div>
    </aside>

    <!-- 主要內容區 -->
    <main class="flex-1 flex flex-col">
      <!-- 頂部搜索與個人資料 -->
      <header class="h-20 bg-[#f3f0e8]/90 backdrop-blur-md border-b-2 border-[#332c23] flex items-center justify-between px-8 sticky top-0 z-20">
        <div class="relative w-full max-w-md">
          <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 text-[#6b5a45] w-4 h-4 stroke-[1.5]"></i>
          <input 
            type="text" 
            id="search-input"
            placeholder="檢索藏品、卷宗或標記..."
            class="w-full bg-[#e8e3d5] border-2 border-[#332c23] placeholder-[#8f8373] py-2.5 pl-10 pr-4 text-sm focus:ring-0 focus:bg-[#f3f0e8] transition-all outline-none font-serif"
          />
        </div>

        <div class="flex items-center gap-5">
          <div class="h-10 w-10 bg-[#e8e3d5] border-2 border-[#332c23] shadow-[2px_2px_0_#332c23] flex items-center justify-center overflow-hidden">
             <img id="user-avatar" src="" alt="User" class="filter grayscale w-full h-full object-cover" />
          </div>
        </div>
      </header>

      <div class="p-8 max-w-7xl mx-auto w-full relative" id="content-area">
        <!-- 內容由 JS 動態渲染 -->
      </div>
    </main>
  </div>

  <!-- 登錄新藏品 Modal -->
  <div id="add-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center px-4">
    <div class="absolute inset-0 bg-[#332c23]/80 backdrop-blur-sm" id="modal-backdrop"></div>
    <div class="bg-[#f3f0e8] w-full max-w-lg border-2 border-[#332c23] shadow-[10px_10px_0_#221d17] relative z-10 overflow-hidden">
      <!-- Modal 角落裝飾 -->
      <svg class="absolute top-0 right-0 w-32 h-32 text-[#332c23] opacity-20 pointer-events-none transform rotate-90 z-0" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="0.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M0,100 Q40,60 100,0" stroke-dasharray="1 1" /><path d="M0,100 Q30,70 100,10" /><path d="M15,85 C5,70 20,55 35,65 C45,75 30,90 15,85 Z" />
      </svg>
      
      <div class="p-6 border-b-2 border-[#332c23] bg-[#e8e3d5] flex justify-between items-center relative z-10">
        <h2 class="text-2xl font-bold tracking-widest">登錄新藏品卷宗</h2>
        <button id="btn-close-modal" class="text-[#332c23] hover:text-[#f3f0e8] hover:bg-[#332c23] p-1 border-2 border-transparent hover:border-[#332c23] transition-colors">
          <i data-lucide="plus" class="rotate-45 w-6 h-6 stroke-[1.5]"></i>
        </button>
      </div>

      <div class="p-8 space-y-6 relative z-10 max-h-[80vh] overflow-y-auto">
        <div id="upload-error" class="hidden bg-red-100 border-2 border-red-800 text-red-800 px-4 py-3 font-bold text-sm tracking-wide shadow-[3px_3px_0_#991b1b]"></div>

        <div class="space-y-2">
          <label class="text-sm font-bold tracking-widest text-[#6b5a45] uppercase">提交實體畫像 (相片上傳)</label>
          <div class="relative border-2 border-dashed border-[#8f8373] bg-[#e8e3d5] hover:bg-[#d1c9b6] transition-colors flex flex-col items-center justify-center p-6 cursor-pointer" id="image-upload-container">
            <div id="image-upload-prompt" class="flex flex-col items-center">
              <i data-lucide="image" class="text-[#6b5a45] mb-2 w-8 h-8 stroke-[1.5]"></i>
              <span class="text-sm font-bold text-[#332c23]">點擊或拖曳上傳 (限制 < 500KB)</span>
            </div>
            <img id="image-preview" src="" alt="預覽" class="hidden max-h-32 object-contain filter grayscale sepia-[0.3]" />
            <input type="file" id="item-image" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer" />
          </div>
        </div>

        <div class="space-y-2">
          <label class="text-sm font-bold tracking-widest text-[#6b5a45] uppercase">藏品名目</label>
          <input type="text" id="item-name" class="w-full bg-[#f3f0e8] border-2 border-[#332c23] px-4 py-3 outline-none focus:bg-[#e8e3d5] transition-colors font-serif shadow-[inset_2px_2px_0_rgba(0,0,0,0.05)]" placeholder="例如：1985 年復古拍立得" />
        </div>

        <div class="grid grid-cols-2 gap-6">
          <div class="space-y-2">
            <label class="text-sm font-bold tracking-widest text-[#6b5a45] uppercase">所屬分類</label>
            <select id="item-collection" class="w-full bg-[#f3f0e8] border-2 border-[#332c23] px-4 py-3 outline-none focus:bg-[#e8e3d5] transition-colors font-serif shadow-[inset_2px_2px_0_rgba(0,0,0,0.05)]">
              <option value="1">鐘錶 - 復古機械錶</option>
              <option value="2">音樂 - 黑膠唱片珍藏</option>
              <option value="3">潮流 - 稀有球鞋</option>
              <option value="4">書籍 - 初版漫畫</option>
            </select>
          </div>
          <div class="space-y-2">
            <label class="text-sm font-bold tracking-widest text-[#6b5a45] uppercase">評估價值</label>
            <input type="text" id="item-price" class="w-full bg-[#f3f0e8] border-2 border-[#332c23] px-4 py-3 outline-none focus:bg-[#e8e3d5] transition-colors font-serif shadow-[inset_2px_2px_0_rgba(0,0,0,0.05)]" placeholder="例如：NT$ 5,000" />
          </div>
        </div>

        <div class="grid grid-cols-2 gap-6">
           <div class="space-y-2">
            <label class="text-sm font-bold tracking-widest text-[#6b5a45] uppercase">品相狀態</label>
            <select id="item-status" class="w-full bg-[#f3f0e8] border-2 border-[#332c23] px-4 py-3 outline-none focus:bg-[#e8e3d5] transition-colors font-serif shadow-[inset_2px_2px_0_rgba(0,0,0,0.05)]">
              <option>全新</option>
              <option>極新</option>
              <option>良好</option>
              <option>二手</option>
              <option>需修復</option>
            </select>
          </div>
          <div class="space-y-2">
            <label class="text-sm font-bold tracking-widest text-[#6b5a45] uppercase">自訂標籤 (用逗號隔開)</label>
            <input type="text" id="item-tags" class="w-full bg-[#f3f0e8] border-2 border-[#332c23] px-4 py-3 outline-none focus:bg-[#e8e3d5] transition-colors font-serif shadow-[inset_2px_2px_0_rgba(0,0,0,0.05)]" placeholder="如：古董, 限量" />
          </div>
        </div>

        <div class="pt-6 flex gap-4 border-t border-dashed border-[#8f8373] mt-2">
          <button id="btn-cancel-modal" class="flex-1 px-6 py-3 border-2 border-[#332c23] bg-[#e8e3d5] font-bold tracking-widest hover:bg-[#d1c9b6] transition-colors shadow-[3px_3px_0_#332c23] active:translate-y-1 active:translate-x-1 active:shadow-none">作廢</button>
          <button id="btn-save-item" class="flex-1 px-6 py-3 bg-[#332c23] text-[#f3f0e8] border-2 border-[#332c23] font-bold tracking-widest hover:bg-[#1a1611] transition-all shadow-[3px_3px_0_#8f8373] active:translate-y-1 active:translate-x-1 active:shadow-none flex items-center justify-center gap-2">確認記載</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    // 使用官方 CDN Firebase 10.12.2 版本 (兼容 Module 格式且穩定)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, doc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    // Firebase 配置
    const firebaseConfig = {
      apiKey: "AIzaSyCT7GK3HmacDwLQaG2nKPR8BYjSGYMHGmI",
      authDomain: "collection-412042.firebaseapp.com",
      projectId: "collection-412042",
      storageBucket: "collection-412042.firebasestorage.app",
      messagingSenderId: "1002836425118",
      appId: "1:1002836425118:web:eb6936013d65859a653e8f"
    };

    // 初始化 Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // 狀態管理
    const state = {
      user: null,
      items: [],
      activeTab: 'dashboard',
      selectedCollection: null,
      viewMode: 'grid',
      searchQuery: '',
      newItemBase64: '',
      unsubscribeSnapshot: null
    };

    // 分類定義
    const INITIAL_COLLECTIONS = [
      { id: 1, name: '復古機械錶', category: '鐘錶', color: 'bg-[#5c5448]', icon: 'clock' },
      { id: 2, name: '黑膠唱片珍藏', category: '音樂', color: 'bg-[#4a4238]', icon: 'music' },
      { id: 3, name: '稀有球鞋', category: '潮流', color: 'bg-[#6b6256]', icon: 'package' },
      { id: 4, name: '初版漫畫', category: '書籍', color: 'bg-[#3d352c]', icon: 'book' },
    ];

    // DOM 元素
    const elLoading = document.getElementById('loading-screen');
    const elLogin = document.getElementById('login-screen');
    const elApp = document.getElementById('main-app');
    const elContentArea = document.getElementById('content-area');
    const elAvatar = document.getElementById('user-avatar');
    const elSearchInput = document.getElementById('search-input');
    
    // Modal DOM 元素
    const elModal = document.getElementById('add-modal');
    const imgPreview = document.getElementById('image-preview');
    const imgPrompt = document.getElementById('image-upload-prompt');
    const errorBox = document.getElementById('upload-error');
    const btnSaveItem = document.getElementById('btn-save-item');

    // 初始化 Icon
    lucide.createIcons();

    // === Firebase 身份驗證監聽 ===
    onAuthStateChanged(auth, (user) => {
      elLoading.classList.add('hidden');
      if (user) {
        state.user = user;
        elAvatar.src = user.photoURL || `https://api.dicebear.com/7.x/avataaars/svg?seed=${user.uid}&backgroundColor=e8e3d5`;
        elLogin.classList.add('hidden');
        elApp.classList.remove('hidden');
        fetchData();
      } else {
        state.user = null;
        elLogin.classList.remove('hidden');
        elApp.classList.add('hidden');
        if (state.unsubscribeSnapshot) state.unsubscribeSnapshot();
      }
    });

    // 登入事件
    document.getElementById('btn-login').addEventListener('click', async () => {
      const provider = new GoogleAuthProvider();
      try {
        await signInWithPopup(auth, provider);
      } catch (error) {
        console.error("登入失敗:", error);
        alert("登入失敗，請重試。");
      }
    });

    // 登出事件
    document.getElementById('btn-logout').addEventListener('click', () => {
      signOut(auth);
    });

    // === 資料獲取 ===
    function fetchData() {
      if (!state.user) return;
      const itemsRef = collection(db, 'users', state.user.uid, 'items');
      const q = query(itemsRef);
      
      state.unsubscribeSnapshot = onSnapshot(q, (snapshot) => {
        let fetchedItems = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        fetchedItems.sort((a, b) => {
          const tA = a.createdAt ? a.createdAt.toMillis() : 0;
          const tB = b.createdAt ? b.createdAt.toMillis() : 0;
          return tB - tA;
        });
        state.items = fetchedItems;
        render();
      }, (error) => {
        console.error("讀取失敗:", error);
      });
    }

    // === 搜尋與過濾 ===
    elSearchInput.addEventListener('input', (e) => {
      state.searchQuery = e.target.value;
      render();
    });

    function getFilteredItems() {
      let result = state.selectedCollection 
        ? state.items.filter(item => item.collectionId === state.selectedCollection.id)
        : state.items;
      
      if (state.searchQuery) {
        const q = state.searchQuery.toLowerCase();
        result = result.filter(item => 
          item.name.toLowerCase().includes(q) ||
          (item.tags && item.tags.some(tag => tag.toLowerCase().includes(q)))
        );
      }
      return result;
    }

    function getCollectionsStats() {
      return INITIAL_COLLECTIONS.map(col => {
        const colItems = state.items.filter(item => item.collectionId === col.id);
        const totalValue = colItems.reduce((acc, item) => {
          const val = parseInt(item.price.replace(/\D/g, '')) || 0;
          return acc + val;
        }, 0);
        return { ...col, itemsCount: colItems.length, totalValue };
      });
    }

    // === 渲染邏輯 ===
    function render() {
      if (state.activeTab === 'dashboard' && !state.selectedCollection) {
        renderDashboard();
      } else {
        renderCollectionList();
      }
      lucide.createIcons();
    }

    function renderDashboard() {
      const stats = getCollectionsStats();
      const totalValueSum = stats.reduce((acc, col) => acc + col.totalValue, 0);

      let collectionsHtml = stats.map(col => `
        <div onclick="window.selectCollection(${col.id})" class="group bg-[#f3f0e8] border-2 border-[#332c23] shadow-[5px_5px_0_#332c23] hover:shadow-[8px_8px_0_#332c23] hover:-translate-y-1 transition-all cursor-pointer relative">
          <div class="h-24 ${col.color} border-b-2 border-[#332c23] relative overflow-hidden flex items-center justify-center">
            <div class="absolute inset-0 opacity-20" style="background-image: repeating-linear-gradient(45deg, #000, #000 1px, transparent 1px, transparent 10px)"></div>
            <i data-lucide="${col.icon}" class="text-[#f3f0e8] opacity-50 relative z-10 w-14 h-14 stroke-1"></i>
          </div>
          <div class="p-6 relative">
            <div class="absolute -top-8 left-6 w-16 h-16 bg-[#e8e3d5] border-2 border-[#332c23] shadow-[3px_3px_0_#332c23] flex items-center justify-center text-[#332c23]">
              <i data-lucide="tag" class="w-7 h-7 stroke-[1.5]"></i>
            </div>
            <div class="mt-8">
              <h3 class="font-bold text-xl tracking-wider">${col.name}</h3>
              <p class="text-[#6b5a45] text-sm mb-4 italic">${col.category}</p>
              <div class="flex justify-between items-center text-sm border-t border-dashed border-[#8f8373] pt-4">
                <span class="text-[#332c23] font-bold">${col.itemsCount} 件記載</span>
                <span class="font-bold border-b border-[#332c23]">NT$ ${col.totalValue.toLocaleString()}</span>
              </div>
            </div>
          </div>
        </div>
      `).join('');

      elContentArea.innerHTML = `
        <div class="space-y-10 animate-[fadeIn_0.5s_ease-out]">
          <div class="flex items-end justify-between border-b-2 border-dashed border-[#8f8373] pb-6">
            <div>
              <h1 class="text-4xl font-bold text-[#332c23] tracking-wide">典藏室概覽</h1>
              <p class="text-[#6b5a45] mt-2 italic text-lg">閣下目前共計有 ${state.items.length} 件珍貴藏品記載於此。</p>
            </div>
            <button onclick="window.openAddModal()" class="bg-[#332c23] hover:bg-[#1a1611] text-[#f3f0e8] px-6 py-3 border-2 border-[#332c23] flex items-center gap-2 font-bold shadow-[4px_4px_0_#8f8373] hover:shadow-[2px_2px_0_#8f8373] transition-all active:translate-y-1 active:translate-x-1">
              <i data-lucide="plus" class="w-5 h-5 stroke-2"></i>
              <span class="tracking-widest">登錄新藏品</span>
            </button>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="bg-[#e8e3d5] p-6 border-2 border-[#332c23] shadow-[5px_5px_0_#332c23] relative group">
              <div class="absolute top-2 right-2 opacity-10 group-hover:scale-110 transition-transform"><i data-lucide="dollar-sign" class="w-16 h-16 stroke-1"></i></div>
              <div class="flex justify-between items-start mb-4 relative z-10">
                <div class="p-3 border-2 border-[#332c23] bg-[#f3f0e8]"><i data-lucide="dollar-sign" class="w-6 h-6 stroke-[1.5] text-[#332c23]"></i></div>
                <span class="text-xs font-bold px-3 py-1 border-2 border-[#332c23] bg-[#f3f0e8] shadow-[2px_2px_0_#332c23]">+12.5%</span>
              </div>
              <h3 class="text-[#6b5a45] text-sm font-bold tracking-widest relative z-10">估計總價值</h3>
              <p class="text-3xl font-bold mt-2 font-serif relative z-10">NT$ ${totalValueSum.toLocaleString()}</p>
            </div>
            
            <div class="bg-[#e8e3d5] p-6 border-2 border-[#332c23] shadow-[5px_5px_0_#332c23] relative group">
              <div class="absolute top-2 right-2 opacity-10 group-hover:scale-110 transition-transform"><i data-lucide="box" class="w-16 h-16 stroke-1"></i></div>
              <div class="flex justify-between items-start mb-4 relative z-10">
                <div class="p-3 border-2 border-[#332c23] bg-[#f3f0e8]"><i data-lucide="box" class="w-6 h-6 stroke-[1.5] text-[#332c23]"></i></div>
                <span class="text-xs font-bold px-3 py-1 border-2 border-[#332c23] bg-[#f3f0e8] shadow-[2px_2px_0_#332c23]">穩定</span>
              </div>
              <h3 class="text-[#6b5a45] text-sm font-bold tracking-widest relative z-10">卷宗總數</h3>
              <p class="text-3xl font-bold mt-2 font-serif relative z-10">${state.items.length} 件</p>
            </div>

            <div class="bg-[#e8e3d5] p-6 border-2 border-[#332c23] shadow-[5px_5px_0_#332c23] relative group">
              <div class="absolute top-2 right-2 opacity-10 group-hover:scale-110 transition-transform"><i data-lucide="heart" class="w-16 h-16 stroke-1"></i></div>
              <div class="flex justify-between items-start mb-4 relative z-10">
                <div class="p-3 border-2 border-[#332c23] bg-[#f3f0e8]"><i data-lucide="heart" class="w-6 h-6 stroke-[1.5] text-[#332c23]"></i></div>
                <span class="text-xs font-bold px-3 py-1 border-2 border-[#332c23] bg-[#f3f0e8] shadow-[2px_2px_0_#332c23]">優良</span>
              </div>
              <h3 class="text-[#6b5a45] text-sm font-bold tracking-widest relative z-10">整體評估</h3>
              <p class="text-3xl font-bold mt-2 font-serif relative z-10">4.8 / 5.0</p>
            </div>
          </div>

          <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8 mt-10">
            ${collectionsHtml}
          </div>
        </div>
      `;
    }

    function renderCollectionList() {
      const filteredItems = getFilteredItems();
      const collectionName = state.selectedCollection ? state.selectedCollection.name : '全部藏品卷宗';

      let itemsHtml = '';
      
      if (filteredItems.length === 0) {
        itemsHtml = `
          <div class="text-center py-20 bg-[#f3f0e8] border-2 border-dashed border-[#8f8373]">
            <i data-lucide="package" class="mx-auto text-[#8f8373] mb-4 w-12 h-12 stroke-1"></i>
            <h3 class="text-xl font-bold tracking-widest mb-2">卷宗庫空無一物</h3>
            <p class="text-[#6b5a45] italic">該分類下目前尚無記載任何珍貴藏品。</p>
          </div>
        `;
      } else if (state.viewMode === 'grid') {
        const gridItems = filteredItems.map(item => `
          <div class="bg-[#f3f0e8] border-2 border-[#332c23] shadow-[5px_5px_0_#332c23] group relative">
            <div class="relative h-56 border-b-2 border-[#332c23] overflow-hidden bg-[#e8e3d5]">
              <img src="${item.image}" alt="${item.name}" class="w-full h-full object-cover filter grayscale-[90%] sepia-[50%] contrast-[1.2] group-hover:scale-105 transition-transform duration-700" />
              <div class="absolute inset-0 opacity-10 pointer-events-none mix-blend-overlay" style="background-image: repeating-linear-gradient(45deg, #000, #000 1px, transparent 1px, transparent 4px)"></div>
              <div class="absolute top-3 right-3 flex gap-2">
                <button onclick="window.deleteItem('${item.id}')" class="bg-[#f3f0e8] border-2 border-[#332c23] p-2 shadow-[2px_2px_0_#332c23] hover:bg-[#332c23] hover:text-[#f3f0e8] transition-colors">
                  <i data-lucide="trash-2" class="w-4 h-4 stroke-2"></i>
                </button>
              </div>
              <div class="absolute bottom-3 left-3 flex gap-2 flex-wrap">
                ${(item.tags || []).map(tag => `<span class="bg-[#332c23] text-[#f3f0e8] text-[10px] tracking-wider px-2 py-1 font-bold border border-[#f3f0e8]">${tag}</span>`).join('')}
              </div>
            </div>
            <div class="p-5">
              <h4 class="font-bold text-lg leading-tight tracking-wide mb-3">${item.name}</h4>
              <div class="flex items-center gap-3 mb-5">
                <div class="flex gap-1">
                  ${[1,2,3,4,5].map(i => `<div class="w-2.5 h-2.5 border border-[#332c23] rotate-45 ${i <= (item.rating||5) ? 'bg-[#332c23]' : 'bg-transparent'}"></div>`).join('')}
                </div>
                <span class="text-xs text-[#6b5a45] italic border-l border-[#332c23] pl-3">${item.status}</span>
              </div>
              <div class="flex justify-between items-center pt-4 border-t border-dashed border-[#8f8373]">
                <div class="flex items-center gap-2 text-[#6b5a45]">
                  <i data-lucide="calendar" class="w-3.5 h-3.5 stroke-[1.5]"></i>
                  <span class="text-xs font-bold">${item.date}</span>
                </div>
                <span class="font-bold text-lg">${item.price}</span>
              </div>
            </div>
          </div>
        `).join('');

        itemsHtml = `
          <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            ${gridItems}
            <button onclick="window.openAddModal()" class="border-2 border-dashed border-[#8f8373] bg-[#e8e3d5]/50 flex flex-col items-center justify-center p-8 text-[#6b5a45] hover:border-[#332c23] hover:text-[#332c23] hover:bg-[#e8e3d5] transition-all group shadow-none hover:shadow-[5px_5px_0_#332c23]">
              <div class="w-14 h-14 border-2 border-[#6b5a45] group-hover:border-[#332c23] flex items-center justify-center mb-4 transition-all">
                <i data-lucide="plus" class="w-7 h-7 stroke-[1.5]"></i>
              </div>
              <span class="font-bold tracking-widest text-lg">登錄新藏品</span>
              <span class="text-sm italic mt-2">Add to Collection</span>
            </button>
          </div>
        `;
      } else {
        const listItems = filteredItems.map(item => `
          <tr class="hover:bg-[#e8e3d5] transition-colors">
            <td class="px-6 py-4 border-r border-dashed border-[#8f8373]">
              <div class="flex items-center gap-4">
                <img src="${item.image}" class="w-12 h-12 border border-[#332c23] object-cover filter grayscale sepia-[.3]" alt="" />
                <span class="font-bold text-md tracking-wide">${item.name}</span>
              </div>
            </td>
            <td class="px-6 py-4 text-sm font-bold text-[#6b5a45] border-r border-dashed border-[#8f8373]">${item.date}</td>
            <td class="px-6 py-4 border-r border-dashed border-[#8f8373]">
              <span class="px-3 py-1 border border-[#332c23] text-xs font-bold bg-[#f3f0e8] shadow-[2px_2px_0_#332c23]">${item.status}</span>
            </td>
            <td class="px-6 py-4 font-bold text-md border-r border-dashed border-[#8f8373]">${item.price}</td>
            <td class="px-6 py-4">
              <button onclick="window.deleteItem('${item.id}')" class="text-red-700 font-bold border-b border-red-700 hover:text-red-900 transition-colors tracking-widest flex items-center gap-1">
                <i data-lucide="trash-2" class="w-3.5 h-3.5"></i> 銷毀
              </button>
            </td>
          </tr>
        `).join('');

        itemsHtml = `
          <div class="bg-[#f3f0e8] border-2 border-[#332c23] shadow-[5px_5px_0_#332c23] overflow-hidden">
            <table class="w-full text-left">
              <thead class="bg-[#e8e3d5] border-b-2 border-[#332c23]">
                <tr>
                  <th class="px-6 py-4 text-sm font-bold tracking-widest uppercase border-r border-[#332c23]">名目</th>
                  <th class="px-6 py-4 text-sm font-bold tracking-widest uppercase border-r border-[#332c23]">登錄日</th>
                  <th class="px-6 py-4 text-sm font-bold tracking-widest uppercase border-r border-[#332c23]">品相</th>
                  <th class="px-6 py-4 text-sm font-bold tracking-widest uppercase border-r border-[#332c23]">估值</th>
                  <th class="px-6 py-4 text-sm font-bold tracking-widest uppercase">操作</th>
                </tr>
              </thead>
              <tbody class="divide-y-2 divide-[#332c23] border-t-2 border-[#332c23]">
                ${listItems}
              </tbody>
            </table>
          </div>
        `;
      }

      elContentArea.innerHTML = `
        <div class="space-y-8 animate-[fadeIn_0.5s_ease-out]">
          <div class="flex flex-col md:flex-row md:items-center justify-between gap-6 border-b-2 border-dashed border-[#8f8373] pb-6">
            <div class="flex items-center gap-4">
              <button onclick="window.clearCollection()" class="p-2 border-2 border-[#332c23] bg-[#e8e3d5] shadow-[2px_2px_0_#332c23] hover:shadow-[4px_4px_0_#332c23] hover:-translate-y-0.5 transition-all">
                <i data-lucide="chevron-left" class="w-6 h-6 stroke-[1.5]"></i>
              </button>
              <div>
                <h1 class="text-3xl font-bold tracking-widest">${collectionName}</h1>
                <nav class="flex text-sm text-[#6b5a45] mt-2 italic">
                  <span>典藏室</span><span class="mx-2">/</span><span class="text-[#332c23] font-bold border-b border-[#332c23]">藏品名錄</span>
                </nav>
              </div>
            </div>

            <div class="flex items-center gap-2 bg-[#e8e3d5] p-1.5 border-2 border-[#332c23] shadow-[3px_3px_0_#332c23]">
              <button onclick="window.setViewMode('grid')" class="p-2 transition-all border-2 ${state.viewMode === 'grid' ? 'border-[#332c23] bg-[#332c23] text-[#f3f0e8]' : 'border-transparent text-[#6b5a45] hover:border-[#332c23]'}">
                <i data-lucide="layout-grid" class="w-5 h-5 stroke-[1.5]"></i>
              </button>
              <button onclick="window.setViewMode('list')" class="p-2 transition-all border-2 ${state.viewMode === 'list' ? 'border-[#332c23] bg-[#332c23] text-[#f3f0e8]' : 'border-transparent text-[#6b5a45] hover:border-[#332c23]'}">
                <i data-lucide="list" class="w-5 h-5 stroke-[1.5]"></i>
              </button>
            </div>
          </div>
          ${itemsHtml}
        </div>
      `;
    }

    // === 選單切換事件 ===
    document.querySelectorAll('.nav-item').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const tab = e.currentTarget.dataset.tab;
        state.activeTab = tab;
        if (tab === 'dashboard') state.selectedCollection = null;
        
        // 更新樣式
        document.querySelectorAll('.nav-item').forEach(b => {
          b.className = "nav-item w-full flex items-center gap-3 px-4 py-3 border-2 border-transparent transition-all duration-200 text-[#6b5a45] hover:border-[#332c23] hover:text-[#332c23] hover:shadow-[3px_3px_0_#b8b0a1]";
        });
        e.currentTarget.className = "nav-item active w-full flex items-center gap-3 px-4 py-3 border-2 border-transparent transition-all duration-200 bg-[#332c23] text-[#f3f0e8] border-[#332c23] shadow-[3px_3px_0_#8f8373]";
        
        render();
      });
    });

    // 暴露給全域的方法 (供 HTML 內 inline onClick 呼叫)
    window.selectCollection = (id) => {
      state.selectedCollection = INITIAL_COLLECTIONS.find(c => c.id === id);
      state.activeTab = 'collections';
      
      document.querySelectorAll('.nav-item').forEach(b => {
          b.className = "nav-item w-full flex items-center gap-3 px-4 py-3 border-2 border-transparent transition-all duration-200 text-[#6b5a45] hover:border-[#332c23] hover:text-[#332c23] hover:shadow-[3px_3px_0_#b8b0a1]";
      });
      document.querySelector('[data-tab="collections"]').className = "nav-item active w-full flex items-center gap-3 px-4 py-3 border-2 border-transparent transition-all duration-200 bg-[#332c23] text-[#f3f0e8] border-[#332c23] shadow-[3px_3px_0_#8f8373]";
      
      render();
    };

    window.clearCollection = () => {
      state.selectedCollection = null;
      render();
    };

    window.setViewMode = (mode) => {
      state.viewMode = mode;
      render();
    };

    window.deleteItem = async (id) => {
      if(!state.user) return;
      try {
        await deleteDoc(doc(db, 'users', state.user.uid, 'items', id));
      } catch (error) {
        console.error("刪除失敗", error);
      }
    };

    // === Modal 與 上傳邏輯 ===
    window.openAddModal = () => {
      state.newItemBase64 = '';
      imgPreview.src = '';
      imgPreview.classList.add('hidden');
      imgPrompt.classList.remove('hidden');
      document.getElementById('item-name').value = '';
      document.getElementById('item-price').value = '';
      document.getElementById('item-tags').value = '';
      errorBox.classList.add('hidden');
      elModal.classList.remove('hidden');
    };

    const closeAddModal = () => {
      elModal.classList.add('hidden');
      btnSaveItem.innerHTML = '確認記載';
      btnSaveItem.disabled = false;
    };

    document.getElementById('btn-close-modal').addEventListener('click', closeAddModal);
    document.getElementById('btn-cancel-modal').addEventListener('click', closeAddModal);
    document.getElementById('modal-backdrop').addEventListener('click', closeAddModal);

    document.getElementById('item-image').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;

      if (file.size > 500 * 1024) {
        errorBox.textContent = '畫像檔案過大，請提供小於 500KB 的影像。';
        errorBox.classList.remove('hidden');
        return;
      }
      errorBox.classList.add('hidden');

      const reader = new FileReader();
      reader.onload = (event) => {
        state.newItemBase64 = event.target.result;
        imgPreview.src = state.newItemBase64;
        imgPreview.classList.remove('hidden');
        imgPrompt.classList.add('hidden');
      };
      reader.readAsDataURL(file);
    });

    document.getElementById('btn-save-item').addEventListener('click', async () => {
      if (!state.user) return;
      
      const name = document.getElementById('item-name').value.trim();
      const collectionId = document.getElementById('item-collection').value;
      const price = document.getElementById('item-price').value.trim();
      const status = document.getElementById('item-status').value;
      const tagsRaw = document.getElementById('item-tags').value;

      if (!name || !price) {
        errorBox.textContent = '請填寫完整名目與估值。';
        errorBox.classList.remove('hidden');
        return;
      }

      btnSaveItem.innerHTML = `<i data-lucide="loader-2" class="animate-spin w-5 h-5"></i>`;
      btnSaveItem.disabled = true;
      lucide.createIcons();

      try {
        const tagsArray = tagsRaw.split(',').map(t => t.trim()).filter(t => t);
        const itemsRef = collection(db, 'users', state.user.uid, 'items');
        
        await addDoc(itemsRef, {
          name: name,
          collectionId: Number(collectionId),
          price: price,
          status: status,
          image: state.newItemBase64 || 'https://images.unsplash.com/photo-1547996111-f7cb39e3d039?auto=format&fit=crop&q=80&w=400',
          tags: tagsArray,
          rating: 5,
          date: new Date().toISOString().split('T')[0],
          createdAt: serverTimestamp()
        });
        
        closeAddModal();
      } catch (error) {
        console.error("儲存失敗:", error);
        errorBox.textContent = '儲存失敗，請確認權限或網路狀態。';
        errorBox.classList.remove('hidden');
        btnSaveItem.innerHTML = '確認記載';
        btnSaveItem.disabled = false;
      }
    });

  </script>
</body>
</html>
