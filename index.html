<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase 整合：Google 登入 & Base64 上傳</title>
</head>
<body>
    <h2>Firebase 測試專案</h2>
    
    <div id="auth-section">
        <button id="login-btn">使用 Google 登入</button>
        <p id="user-status">尚未登入</p>
    </div>

    <hr>

    <div id="upload-section" style="display: none;">
        <h3>上傳 Base64 圖片到 Firestore</h3>
        <input type="file" id="image-input" accept="image/*">
        <button id="upload-btn">轉換 Base64 並儲存到 Firestore</button>
        <p id="upload-status"></p>
    </div>

    <script type="module">
        // 1. 引入 Firebase 核心與所需的模組
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

        // 2. 你的 Firebase 設定
        const firebaseConfig = {
            apiKey: "AIzaSyCT7GK3HmacDwLQaG2nKPR8BYjSGYMHGmI",
            authDomain: "collection-412042.firebaseapp.com",
            projectId: "collection-412042",
            storageBucket: "collection-412042.firebasestorage.app",
            messagingSenderId: "1002836425118",
            appId: "1:1002836425118:web:eb6936013d65859a653e8f"
        };

        // 3. 初始化 Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // DOM 元素
        const loginBtn = document.getElementById('login-btn');
        const userStatus = document.getElementById('user-status');
        const uploadSection = document.getElementById('upload-section');
        const imageInput = document.getElementById('image-input');
        const uploadBtn = document.getElementById('upload-btn');
        const uploadStatus = document.getElementById('upload-status');

        let currentUser = null;

        // ==========================================
        // 功能一：Google 登入
        // ==========================================
        loginBtn.addEventListener('click', async () => {
            try {
                const result = await signInWithPopup(auth, provider);
                console.log("登入成功", result.user);
            } catch (error) {
                console.error("登入失敗", error);
                alert("登入失敗：" + error.message);
            }
        });

        // 監聽登入狀態
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                userStatus.textContent = `已登入：${user.displayName} (${user.email})`;
                loginBtn.style.display = 'none';
                uploadSection.style.display = 'block'; // 登入後顯示上傳區塊
            } else {
                currentUser = null;
                userStatus.textContent = '尚未登入';
                loginBtn.style.display = 'block';
                uploadSection.style.display = 'none';
            }
        });

        // ==========================================
        // 功能二：檔案轉 Base64 並上傳至 Firestore
        // ==========================================
        uploadBtn.addEventListener('click', () => {
            const file = imageInput.files[0];
            if (!file) {
                alert("請先選擇一張圖片！");
                return;
            }

            // 使用 FileReader 將圖片轉換為 Base64 字串
            const reader = new FileReader();
            reader.onload = async function(e) {
                const base64String = e.target.result;
                
                try {
                    uploadStatus.textContent = "上傳中...";
                    uploadBtn.disabled = true;

                    // 寫入資料到 Firestore 的 "images" 集合 (Collection)
                    const docRef = await addDoc(collection(db, "images"), {
                        userId: currentUser.uid,          // 紀錄是誰上傳的
                        uploaderName: currentUser.displayName,
                        imageBase64: base64String,        // Base64 圖片字串
                        createdAt: serverTimestamp()      // 伺服器時間戳記
                    });

                    uploadStatus.textContent = `上傳成功！文件 ID: ${docRef.id}`;
                    console.log("Document written with ID: ", docRef.id);
                } catch (error) {
                    console.error("寫入資料庫失敗: ", error);
                    uploadStatus.textContent = "上傳失敗，請查看 Console。";
                } finally {
                    uploadBtn.disabled = false;
                }
            };
            
            // 讀取檔案為 Data URL (即 Base64 格式)
            reader.readAsDataURL(file);
        });
    </script>
</body>
</html>
